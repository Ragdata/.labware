[symbols]
error = [✘]
warning = 🛆
info = ✚
success = [🗸]
tip = ★
important = ⚑
debug = ⚙
head = ➤
dot = ⦁

[styles]
error = bright_red
warning = dark_orange
info = dodger_blue1
success = bright_green
tip = cyan3
important = purple3
debug = white
head = dark_goldenrod
dot = green

[logging]
level = 20
size = 1048576
count = 3
format = std
logdir = .labware/log

[log_formats]
std = %(asctime)s :: %(levelname)s :: %(message)s
short = %(levelname)s :: %(message)s
long = %(asctime)s :: %(levelname)s :: %(message)s in %(filename)s\n%(pathname)s [ %(funcName)s line %(lineno)s ]
console = %(message)s
date = %Y-%m-%d %H:%M:%S

[dir]
dot = .dotfiles
lab = .labware
lib = %(dot)s/lib
reg = %(lab)s/reg
aliases = %(lib)s/aliases
assets = %(lib)s/assets
completions = %(lib)s/completions
functions = %(lib)s/functions
help = %(lib)s/help
plugins = %(lib)s/plugins
profiles = %(lib)s/profiles
scripts = %(lab)s/scripts
