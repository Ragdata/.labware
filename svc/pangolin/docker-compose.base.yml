name: pangolin
services:
  pangolin:
    image: docker.io/fosrl/pangolin:ee-latest
    container_name: pangolin
    restart: unless-stopped
    volumes:
      - ${HOSTDIR}/config:/app/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/v1/"]
      interval: "10s"
      timeout: "10s"
      retries: 15

  gerbil:
    image: docker.io/fosrl/gerbil:latest
    container_name: gerbil
    restart: unless-stopped
    depends_on:
      pangolin:
        condition: service_healthy
    command:
      - --reachableAt=http://gerbil:3004
      - --generateAndSaveKeyTo=/var/config/key
      - --remoteConfig=http://pangolin:3001/api/v1/
    volumes:
      - ${HOSTDIR}/config/:/var/config
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    ports:
      - "51820:51820/udp"
      - "21820:21820/udp"
      - "443:443"
      - "80:80"
    healthcheck:
      test: ["CMD", "test", "-f", "/entrypoint.sh"]
      interval: "10s"
      timeout: "10s"
      retries: 15

  traefik:
    image: docker.io/traefik:latest
    container_name: traefik
    restart: unless-stopped
    network_mode: service:gerbil # Ports appear on the gerbil service
    depends_on:
      pangolin:
        condition: service_healthy
    command:
      - --configFile=/etc/traefik/traefik_config.yml
    environment:
      CLOUDFLARE_DNS_API_TOKEN: ${CLOUDFLARE_TOKEN}
    volumes:
      - ${HOSTDIR}/config/traefik:/etc/traefik:ro # Volume to store the Traefik configuration
      - ${HOSTDIR}/config/traefik/rules:/rules:ro # Volume to store the Traefik dynamic configuration
      - ${HOSTDIR}/config/letsencrypt:/letsencrypt # Volume to store the Let's Encrypt certificates
      - ${HOSTDIR}/config/traefik/logs:/var/log/traefik # Volume to store Traefik logs
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    healthcheck:
      test: ["CMD", "test", "-f", "/entrypoint.sh"]
      interval: "10s"
      timeout: "10s"
      retries: 15

networks:
  default:
    driver: bridge
    name: pangolin

